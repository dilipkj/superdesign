<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>SuperDesign Web</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    #preview { border: 1px solid #ccc; margin-top: 1rem; padding: 1rem; min-height: 200px; }
    form { margin-bottom: 1rem; }
    input { width: 60%; padding: 0.5rem; }
    button { padding: 0.5rem 1rem; }
  </style>
</head>
<body>
  <h1>SuperDesign Web</h1>
  <form id="design-form">
    <input type="text" id="prompt" placeholder="Describe a UI"/>
    <button type="submit">Generate</button>
  </form>
  <div id="preview"></div>
  <script>
  document.getElementById('design-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const promptInput = document.getElementById('prompt');
    const prompt = promptInput ? promptInput.value : '';
    const res = await fetch('/api/design', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    if (data.html) {
      document.getElementById('preview').innerHTML = data.html;
    } else {
      document.getElementById('preview').textContent = data.error || 'Error generating design';
    }
  });
  </script>
</body>
</html>
